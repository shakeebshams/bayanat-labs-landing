document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5px;\\\">Bayanat Labs<\\/span>\\n    <\\/div>\\n    <div style=\\\"display:flex;gap:30px;font-size:14px;color:#71717a;\\\"><span>About<\\/span><span>Platform<\\/span><span>Careers<\\/span><span>Contact<\\/span><\\/div>\\n    <span style=\\\"font-size:13px;color:#a1a1aa;\\\">© 2026 Bayanat Labs · Riyadh<\\/span>\\n  <\\/div>\\n<\\/div>\\n<\\/x-dc>\\n<script type=\\\"text/x-dc\\\" data-dc-script data-props=\\\"{&quot;$preview&quot;:{&quot;width&quot;:1280}}\\\">\\nclass Component extends DCLogic {\\n  buildRibbon(opts) {\\n    const o = Object.assign({ w: 560, h: 640, bands: 13, amp: 60, freq: 0.011, phase: 0, baseWidth: 64, gap: 9, opacity: 0.16 }, opts);\\n    const gid = 'rg' + Math.random().toString(36).slice(2, 8);\\n    const stops = [\\n      ['0', '#a5b4fc'], ['0.22', '#818cf8'], ['0.45', '#4f46e5'],\\n      ['0.68', '#4338ca'], ['0.85', '#6366f1'], ['1', '#a5b4fc']\\n    ];\\n    const grad = React.createElement('linearGradient',\\n      { id: gid, x1: '0', y1: '0', x2: '1', y2: '0.55' },\\n      stops.map((s, i) => React.createElement('stop', { key: i, offset: s[0], stopColor: s[1] }))\\n    );\\n    const mk = (offY, widthMul, op, ph) => {\\n      let d = '';\\n      for (let x = 0; x <= o.w; x += 8) {\\n        const y = o.h / 2 + offY + Math.sin(x * o.freq + o.phase + ph) * o.amp\\n          + Math.sin(x * o.freq * 2.3 + ph) * (o.amp * 0.28);\\n        d += (x === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';\\n      }\\n      return { d, w: o.baseWidth * widthMul, op };\\n    };\\n    const paths = [];\\n    for (let b = 0; b < o.bands; b++) {\\n      const t = (b - (o.bands - 1) / 2);\\n      const offY = t * o.gap;\\n      const widthMul = 1 - Math.abs(t) / (o.bands * 0.85);\\n      const p = mk(offY, Math.max(0.18, widthMul), o.opacity, b * 0.16);\\n      paths.push(React.createElement('path', {\\n        key: b, d: p.d, fill: 'none', stroke: 'url(#' + gid + ')',\\n        strokeWidth: p.w, strokeLinecap: 'round', opacity: p.op\\n      }));\\n    }\\n    // crisp glass highlights\\n    for (let h = 0; h < 3; h++) {\\n      const ph = h * 0.5;\\n      let d = '';\\n      for (let x = 0; x <= o.w; x += 8) {\\n        const y = o.h / 2 + (h - 1) * o.gap * 1.2 + Math.sin(x * o.freq + o.phase + ph) * o.amp\\n          + Math.sin(x * o.freq * 2.3 + ph) * (o.amp * 0.28);\\n        d += (x === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';\\n      }\\n      paths.push(React.createElement('path', {\\n        key: 'h' + h, d, fill: 'none', stroke: 'rgba(255,255,255,0.7)',\\n        strokeWidth: 1.4, strokeLinecap: 'round', opacity: 0.5 - h * 0.13\\n      }));\\n    }\\n    return React.createElement('svg', {\\n      viewBox: '0 0 ' + o.w + ' ' + o.h, width: '100%', height: '100%',\\n      preserveAspectRatio: o.preserve || 'xMidYMid meet',\\n      style: { display: 'block', overflow: 'visible' }\\n    }, React.createElement('defs', null, grad), paths);\\n  }\\n\\n  buildDotMap() {\\n    const W = 100, H = 78;\\n    const ells = [\\n      [30, 52, 29, 15],\\n      [52, 53, 11, 15],\\n      [77, 56, 12, 16],\\n      [64, 37, 10, 9],\\n      [55, 29, 13, 6],\\n      [57, 69, 9, 8]\\n    ];\\n    const inside = (x, y) => ells.some(e => {\\n      const dx = (x - e[0]) / e[2], dy = (y - e[1]) / e[3];\\n      return dx * dx + dy * dy <= 1;\\n    });\\n    const dots = [];\\n    const step = 2.5;\\n    let i = 0;\\n    for (let y = 2; y < H; y += step) {\\n      for (let x = 2; x < W; x += step) {\\n        if (inside(x, y)) {\\n          const op = 0.3 + ((x * 7 + y * 3) % 5) * 0.06;\\n          dots.push(React.createElement('circle', {\\n            key: i++, cx: x.toFixed(1), cy: y.toFixed(1), r: 0.85,\\n            fill: '#8b93a3', opacity: op\\n          }));\\n        }\\n      }\\n    }\\n    return React.createElement('svg', {\\n      viewBox: '0 0 ' + W + ' ' + H, width: '100%', height: '100%',\\n      preserveAspectRatio: 'none', style: { display: 'block' }\\n    }, dots);\\n  }\\n\\n  renderVals() {\\n    return {\\n      dialectMap: this.buildDotMap(),\\n      heroRibbon: this.buildRibbon({ w: 560, h: 640, bands: 14, amp: 78, freq: 0.0095, phase: 1.2, baseWidth: 70, gap: 11 }),\\n      accentRibbon: this.buildRibbon({ w: 360, h: 420, bands: 11, amp: 52, freq: 0.013, phase: 0.4, baseWidth: 52, gap: 9 }),\\n      bottomWave: this.buildRibbon({ w: 1180, h: 420, bands: 16, amp: 92, freq: 0.0052, phase: 0.2, baseWidth: 76, gap: 12, preserve: 'none' })\\n    };\\n  }\\n}\\n<\\/script>\\n<\\/body>\\n<\\/html>\\n\",\n  \"Bayanat Amber.dc.html\": \"<!DOCTYPE html>\\n<html>\\n<head>\\n<meta charset=\\\"utf-8\\\">\\n<meta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1\\\">\\n<script src=\\\"./support.js\\\"><\\/script>\\n<\\/head>\\n<body>\\n<x-dc>\\n<helmet>\\n<link rel=\\\"preconnect\\\" href=\\\"https://fonts.googleapis.com\\\">\\n<link rel=\\\"preconnect\\\" href=\\\"https://fonts.gstatic.com\\\" crossorigin>\\n<link href=\\\"https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap\\\" rel=\\\"stylesheet\\\">\\n<style>\\n  *{box-sizing:border-box;}\\n  body{margin:0;background:#fff;}\\n  ::selection{background:#d97706;color:#fff;}\\n  @keyframes shimmer{0%,100%{filter:brightness(1);}50%{filter:brightness(1.05);}}\\n  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}\\n  @keyframes floaty2{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-9px) rotate(-1.2deg);}}\\n  @keyframes ping{0%{transform:translate(-50%,-50%) scale(.5);opacity:.5;}70%,100%{transform:translate(-50%,-50%) scale(2.4);opacity:0;}}\\n<\\/style>\\n<template id=\\\"__bundler_thumbnail\\\" data-bg-color=\\\"#ffffff\\\">\\n  <svg viewBox=\\\"0 0 1200 800\\\" xmlns=\\\"http://www.w3.org/2000/svg\\\">\\n    <rect width=\\\"1200\\\" height=\\\"800\\\" fill=\\\"#ffffff\\\"/>\\n    <defs><linearGradient id=\\\"t\\\" x1=\\\"0\\\" y1=\\\"0\\\" x2=\\\"1\\\" y2=\\\"1\\\">\\n      <stop offset=\\\"0\\\" sto r;gap:10px;\\\">\\n      <div style=\\\"width:13px;height:13px;border-radius:50%;background:conic-gradient(from 0deg,#fcd34d,#fbbf24,#d97706,#b45309,#fcd34d);\\\"><\\/div>\\n      <span style=\\\"font-weight:700;font-size:15px;\\\">Bayanat Labs<\\/span>\\n    <\\/div>\\n    <div style=\\\"display:flex;gap:30px;font-size:14px;color:#71717a;\\\"><span>About<\\/span><span>Platform<\\/span><span>Careers<\\/span><span>Contact<\\/span><\\/div>\\n    <span style=\\\"font-size:13px;color:#a1a1aa;\\\">© 2026 Bayanat Labs · Riyadh<\\/span>\\n  <\\/div>\\n<\\/div>\\n<\\/x-dc>\\n<script type=\\\"text/x-dc\\\" data-dc-script data-props=\\\"{&quot;$preview&quot;:{&quot;width&quot;:1280}}\\\">\\nclass Component extends DCLogic {\\n  buildRibbon(opts) {\\n    const o = Object.assign({ w: 560, h: 640, bands: 13, amp: 60, freq: 0.011, phase: 0, baseWidth: 64, gap: 9, opacity: 0.16 }, opts);\\n    const gid = 'rg' + Math.random().toString(36).slice(2, 8);\\n    const stops = [\\n      ['0', '#fcd34d'], ['0.22', '#fbbf24'], ['0.45', '#d97706'],\\n      ['0.68', '#b45309'], ['0.85', '#f59e0b'], ['1', '#fcd34d']\\n    ];\\n    const grad = React.createElement('linearGradient',\\n      { id: gid, x1: '0', y1: '0', x2: '1', y2: '0.55' },\\n      stops.map((s, i) => React.createElement('stop', { key: i, offset: s[0], stopColor: s[1] }))\\n    );\\n    const mk = (offY, widthMul, op, ph) => {\\n      let d = '';\\n      for (let x = 0; x <= o.w; x += 8) {\\n        const y = o.h / 2 + offY + Math.sin(x * o.freq + o.phase + ph) * o.amp\\n          + Math.sin(x * o.freq * 2.3 + ph) * (o.amp * 0.28);\\n        d += (x === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';\\n      }\\n      return { d, w: o.baseWidth * widthMul, op };\\n    };\\n    const paths = [];\\n    for (let b = 0; b < o.bands; b++) {\\n      const t = (b - (o.bands - 1) / 2);\\n      const offY = t * o.gap;\\n      const widthMul = 1 - Math.abs(t) / (o.bands * 0.85);\\n      const p = mk(offY, Math.max(0.18, widthMul), o.opacity, b * 0.16);\\n      paths.push(React.createElement('path', {\\n        key: b, d: p.d, fill: 'none', stroke: 'url(#' + gid + ')',\\n        strokeWidth: p.w, strokeLinecap: 'round', opacity: p.op\\n      }));\\n    }\\n    // crisp glass highlights\\n    for (let h = 0; h < 3; h++) {\\n      const ph = h * 0.5;\\n      let d = '';\\n      for (let x = 0; x <= o.w; x += 8) {\\n        const y = o.h / 2 + (h - 1) * o.gap * 1.2 + Math.sin(x * o.freq + o.phase + ph) * o.amp\\n          + Math.sin(x * o.freq * 2.3 + ph) * (o.amp * 0.28);\\n        d += (x === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';\\n      }\\n      paths.push(React.createElement('path', {\\n        key: 'h' + h, d, fill: 'none', stroke: 'rgba(255,255,255,0.7)',\\n        strokeWidth: 1.4, strokeLinecap: 'round', opacity: 0.5 - h * 0.13\\n      }));\\n    }\\n    return React.createElement('svg', {\\n      viewBox: '0 0 ' + o.w + ' ' + o.h, width: '100%', height: '100%',\\n      preserveAspectRatio: o.preserve || 'xMidYMid meet',\\n      style: { display: 'block', overflow: 'visible' }\\n    }, React.createElement('defs', null, grad), paths);\\n  }\\n\\n  buildDotMap() {\\n    const W = 100, H = 78;\\n    const ells = [\\n      [30, 52, 29, 15],\\n      [52, 53, 11, 15],\\n      [77, 56, 12, 16],\\n      [64, 37, 10, 9],\\n      [55, 29, 13, 6],\\n      [57, 69, 9, 8]\\n    ];\\n    const inside = (x, y) => ells.some(e => {\\n      const dx = (x - e[0]) / e[2], dy = (y - e[1]) / e[3];\\n      return dx * dx + dy * dy <= 1;\\n    });\\n    const dots = [];\\n    const step = 2.5;\\n    let i = 0;\\n    for (let y = 2; y < H; y += step) {\\n      for (let x = 2; x < W; x += step) {\\n        if (inside(x, y)) {\\n          const op = 0.3 + ((x * 7 + y * 3) % 5) * 0.06;\\n          dots.push(React.createElement('circle', {\\n            key: i++, cx: x.toFixed(1), cy: y.toFixed(1), r: 0.85,\\n            fill: '#8b93a3', opacity: op\\n          }));\\n        }\\n      }\\n    }\\n    return React.createElement('svg', {\\n      viewBox: '0 0 ' + W + ' ' + H, width: '100%', height: '100%',\\n      preserveAspectRatio: 'none', style: { display: 'block' }\\n    }, dots);\\n  }\\n\\n  renderVals() {\\n    return {\\n      dialectMap: this.buildDotMap(),\\n      heroRibbon: this.buildRibbon({ w: 560, h: 640, bands: 14, amp: 78, freq: 0.0095, phase: 1.2, baseWidth: 70, gap: 11 }),\\n      accentRibbon: this.buildRibbon({ w: 360, h: 420, bands: 11, amp: 52, freq: 0.013, phase: 0.4, baseWidth: 52, gap: 9 }),\\n      bottomWave: this.buildRibbon({ w: 1180, h: 420, bands: 16, amp: 92, freq: 0.0052, phase: 0.2, baseWidth: 76, gap: 12, preserve: 'none' })\\n    };\\n  }\\n}\\n<\\/script>\\n<\\/body>\\n<\\/html>\\n\",\n  \"Bayanat Emerald.dc.html\": \"<!DOCTYPE html>\\n<html>\\n<head>\\n<meta charset=\\\"utf-8\\\">\\n<meta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1\\\">\\n<script src=\\\"./support.js\\\"><\\/script>\\n<\\/head>\\n<body>\\n<x-dc>\\n<helmet>\\n<link rel=\\\"preconnect\\\" href=\\\"https://fonts.googleapis.com\\\">\\n<link rel=\\\"preconnect\\\" href=\\\"https://fonts.gstatic.com\\\" crossorigin>\\n<link href=\\\"https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap\\\" rel=\\\"stylesheet\\\">\\n<style>\\n  *{box-sizing:border-box;}\\n  body{margin:0;background:#fff;}\\n  ::selection{background:#059669;color:#fff;}\\n  @keyframes shimmer{0%,100%{filter:brightness(1);}50%{filter:brightness(1.05);}}\\n  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}\\n  @keyframes floaty2{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-9px) rotate(-1.2deg);}}\\n  @keyframes ping{0%{transform:translate(-50%,-50%) scale(.5);opacity:.5;}70%,100%{transform:translate(-50%,-50%) scale(2.4);opacity:0;}}\\n<\\/style>\\n<template id=\\\"__bundler_thumbnail\\\" data-bg-color=\\\"#ffffff\\\">\\n  <svg viewBox=\\\"0 0 1200 800\\\" xmlns=\\\"http://w ;\\n    for (let b = 0; b < o.bands; b++) {\\n      const t = (b - (o.bands - 1) / 2);\\n      const offY = t * o.gap;\\n      const widthMul = 1 - Math.abs(t) / (o.bands * 0.85);\\n      const p = mk(offY, Math.max(0.18, widthMul), o.opacity, b * 0.16);\\n      paths.push(React.createElement('path', {\\n        key: b, d: p.d, fill: 'none', stroke: 'url(#' + gid + ')',\\n        strokeWidth: p.w, strokeLinecap: 'round', opacity: p.op\\n      }));\\n    }\\n    // crisp glass highlights\\n    for (let h = 0; h < 3; h++) {\\n      const ph = h * 0.5;\\n      let d = '';\\n      for (let x = 0; x <= o.w; x += 8) {\\n        const y = o.h / 2 + (h - 1) * o.gap * 1.2 + Math.sin(x * o.freq + o.phase + ph) * o.amp\\n          + Math.sin(x * o.freq * 2.3 + ph) * (o.amp * 0.28);\\n        d += (x === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';\\n      }\\n      paths.push(React.createElement('path', {\\n        key: 'h' + h, d, fill: 'none', stroke: 'rgba(255,255,255,0.7)',\\n        strokeWidth: 1.4, strokeLinecap: 'round', opacity: 0.5 - h * 0.13\\n      }));\\n    }\\n    return React.createElement('svg', {\\n      viewBox: '0 0 ' + o.w + ' ' + o.h, width: '100%', height: '100%',\\n      preserveAspectRatio: o.preserve || 'xMidYMid meet',\\n      style: { display: 'block', overflow: 'visible' }\\n    }, React.createElement('defs', null, grad), paths);\\n  }\\n\\n  buildDotMap() {\\n    const W = 100, H = 78;\\n    const ells = [\\n      [30, 52, 29, 15],\\n      [52, 53, 11, 15],\\n      [77, 56, 12, 16],\\n      [64, 37, 10, 9],\\n      [55, 29, 13, 6],\\n      [57, 69, 9, 8]\\n    ];\\n    const inside = (x, y) => ells.some(e => {\\n      const dx = (x - e[0]) / e[2], dy = (y - e[1]) / e[3];\\n      return dx * dx + dy * dy <= 1;\\n    });\\n    const dots = [];\\n    const step = 2.5;\\n    let i = 0;\\n    for (let y = 2; y < H; y += step) {\\n      for (let x = 2; x < W; x += step) {\\n        if (inside(x, y)) {\\n          const op = 0.3 + ((x * 7 + y * 3) % 5) * 0.06;\\n          dots.push(React.createElement('circle', {\\n            key: i++, cx: x.toFixed(1), cy: y.toFixed(1), r: 0.85,\\n            fill: '#8b93a3', opacity: op\\n          }));\\n        }\\n      }\\n    }\\n    return React.createElement('svg', {\\n      viewBox: '0 0 ' + W + ' ' + H, width: '100%', height: '100%',\\n      preserveAspectRatio: 'none', style: { display: 'block' }\\n    }, dots);\\n  }\\n\\n  renderVals() {\\n    return {\\n      dialectMap: this.buildDotMap(),\\n      heroRibbon: this.buildRibbon({ w: 560, h: 640, bands: 14, amp: 78, freq: 0.0095, phase: 1.2, baseWidth: 70, gap: 11 }),\\n      accentRibbon: this.buildRibbon({ w: 360, h: 420, bands: 11, amp: 52, freq: 0.013, phase: 0.4, baseWidth: 52, gap: 9 }),\\n      bottomWave: this.buildRibbon({ w: 1180, h: 420, bands: 16, amp: 92, freq: 0.0052, phase: 0.2, baseWidth: 76, gap: 12, preserve: 'none' })\\n    };\\n  }\\n}\\n<\\/script>\\n<\\/body>\\n<\\/html>\\n\",\n  \"Bayanat Graphite.dc.html\": \"<!DOCTYPE html>\\n<html>\\n<head>\\n<meta charset=\\\"utf-8\\\">\\n<meta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1\\\">\\n<script src=\\\"./support.js\\\"><\\/script>\\n<\\/head>\\n<body>\\n<x-dc>\\n<helmet>\\n<link rel=\\\"preconnect\\\" href=\\\"https://fonts.googleapis.com\\\">\\n<link rel=\\\"preconnect\\\" href=\\\"https://fonts.gstatic.com\\\" crossorigin>\\n<link href=\\\"https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap\\\" rel=\\\"stylesheet\\\">\\n<style>\\n  *{box-sizing:border-box;}\\n  body{margin:0;background:#fff;}\\n  ::selection{background:#64748b;color:#fff;}\\n  @keyframes shimmer{0%,100%{filter:brightness(1);}50%{filter:brightness(1.05);}}\\n  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}\\n  @keyframes floaty2{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-9px) rotate(-1.2deg);}}\\n  @keyframes ping{0%{transform:translate(-50%,-50%) s padding:16px 36px;border-radius:10px;font-size:17px;\\\">Get in touch<\\/span>\\n    <div style=\\\"position:relative;height:420px;margin-top:10px;animation:shimmer 20s linear infinite;\\\">{{ bottomWave }}<\\/div>\\n  <\\/div>\\n\\n  <!-- FOOTER -->\\n  <div style=\\\"position:relative;z-index:2;border-top:1px solid #ededf2;padding:40px 64px;display:flex;align-items:center;justify-content:space-between;\\\">\\n    <div style=\\\"display:flex;align-items:center;gap:10px;\\\">\\n      <div style=\\\"width:13px;height:13px;border-radius:50%;background:conic-gradient(from 0deg,#e2e8f0,#cbd5e1,#64748b,#94a3b8,#e2e8f0);\\\"><\\/div>\\n      <span style=\\\"font-weight:700;font-size:15px;\\\">Bayanat Labs<\\/span>\\n    <\\/div>\\n    <div style=\\\"display:flex;gap:30px;font-size:14px;color:#71717a;\\\"><span>About<\\/span><span>Platform<\\/span><span>Careers<\\/span><span>Contact<\\/span><\\/div>\\n    <span style=\\\"font-size:13px;color:#a1a1aa;\\\">© 2026 Bayanat Labs · Riyadh<\\/span>\\n  <\\/div>\\n<\\/div>\\n<\\/x-dc>\\n<script type=\\\"text/x-dc\\\" data-dc-script data-props=\\\"{&quot;$preview&quot;:{&quot;width&quot;:1280}}\\\">\\nclass Component extends DCLogic {\\n  buildRibbon(opts) {\\n    const o = Object.assign({ w: 560, h: 640, bands: 13, amp: 60, freq: 0.011, phase: 0, baseWidth: 64, gap: 9, opacity: 0.16 }, opts);\\n    const gid = 'rg' + Math.random().toString(36).slice(2, 8);\\n    const stops = [\\n      ['0', '#e2e8f0'], ['0.22', '#cbd5e1'], ['0.45', '#64748b'],\\n      ['0.68', '#94a3b8'], ['0.85', '#475569'], ['1', '#e2e8f0']\\n    ];\\n    const grad = React.createElement('linearGradient',\\n      { id: gid, x1: '0', y1: '0', x2: '1', y2: '0.55' },\\n      stops.map((s, i) => React.createElement('stop', { key: i, offset: s[0], stopColor: s[1] }))\\n    );\\n    const mk = (offY, widthMul, op, ph) => {\\n      let d = '';\\n      for (let x = 0; x <= o.w; x += 8) {\\n        const y = o.h / 2 + offY + Math.sin(x * o.freq + o.phase + ph) * o.amp\\n          + Math.sin(x * o.freq * 2.3 + ph) * (o.amp * 0.28);\\n        d += (x === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';\\n      }\\n      return { d, w: o.baseWidth * widthMul, op };\\n    };\\n    const paths = [];\\n    for (let b = 0; b < o.bands; b++) {\\n      const t = (b - (o.bands - 1) / 2);\\n      const offY = t * o.gap;\\n      const widthMul = 1 - Math.abs(t) / (o.bands * 0.85);\\n      const p = mk(offY, Math.max(0.18, widthMul), o.opacity, b * 0.16);\\n      paths.push(React.createElement('path', {\\n        key: b, d: p.d, fill: 'none', stroke: 'url(#' + gid + ')',\\n        strokeWidth: p.w, strokeLinecap: 'round', opacity: p.op\\n      }));\\n    }\\n    // crisp glass highlights\\n    for (let h = 0; h < 3; h++) {\\n      const ph = h * 0.5;\\n      let d = '';\\n      for (let x = 0; x <= o.w; x += 8) {\\n        const y = o.h / 2 + (h - 1) * o.gap * 1.2 + Math.sin(x * o.freq + o.phase + ph) * o.amp\\n          + Math.sin(x * o.freq * 2.3 + ph) * (o.amp * 0.28);\\n        d += (x === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';\\n      }\\n      paths.push(React.createElement('path', {\\n        key: 'h' + h, d, fill: 'none', stroke: 'rgba(255,255,255,0.7)',\\n        strokeWidth: 1.4, strokeLinecap: 'round', opacity: 0.5 - h * 0.13\\n      }));\\n    }\\n    return React.createElement('svg', {\\n      viewBox: '0 0 ' + o.w + ' ' + o.h, width: '100%', height: '100%',\\n      preserveAspectRatio: o.preserve || 'xMidYMid meet',\\n      style: { display: 'block', overflow: 'visible' }\\n    }, React.createElement('defs', null, grad), paths);\\n  }\\n\\n  buildDotMap() {\\n    const W = 100, H = 78;\\n    const ells = [\\n      [30, 52, 29, 15],\\n      [52, 53, 11, 15],\\n      [77, 56, 12, 16],\\n      [64, 37, 10, 9],\\n      [55, 29, 13, 6],\\n      [57, 69, 9, 8]\\n    ];\\n    const inside = (x, y) => ells.some(e => {\\n      const dx = (x - e[0]) / e[2], dy = (y - e[1]) / e[3];\\n      return dx * dx + dy * dy <= 1;\\n    });\\n    const dots = [];\\n    const step = 2.5;\\n    let i = 0;\\n    for (let y = 2; y < H; y += step) {\\n      for (let x = 2; x < W; x += step) {\\n        if (inside(x, y)) {\\n          const op = 0.3 + ((x * 7 + y * 3) % 5) * 0.06;\\n          dots.push(React.createElement('circle', {\\n            key: i++, cx: x.toFixed(1), cy: y.toFixed(1), r: 0.85,\\n            fill: '#8b93a3', opacity: op\\n          }));\\n        }\\n      }\\n    }\\n    return React.createElement('svg', {\\n      viewBox: '0 0 ' + W + ' ' + H, width: '100%', height: '100%',\\n      preserveAspectRatio: 'none', style: { display: 'block' }\\n    }, dots);\\n  }\\n\\n  renderVals() {\\n    return {\\n      dialectMap: this.buildDotMap(),\\n      heroRibbon: this.buildRibbon({ w: 560, h: 640, bands: 14, amp: 78, freq: 0.0095, phase: 1.2, baseWidth: 70, gap: 11 }),\\n      accentRibbon: this.buildRibbon({ w: 360, h: 420, bands: 11, amp: 52, freq: 0.013, phase: 0.4, baseWidth: 52, gap: 9 }),\\n      bottomWave: this.buildRibbon({ w: 1180, h: 420, bands: 16, amp: 92, freq: 0.0052, phase: 0.2, baseWidth: 76, gap: 12, preserve: 'none' })\\n    };\\n  }\\n}\\n<\\/script>\\n<\\/body>\\n<\\/html>\\n\",\n  \"image-slot.js\": \"// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)\\n/* BEGIN USAGE */\\n/**\\n * <image-slot> — user-fillable image placeholder.\\n *\\n * Drop this into a deck, mockup, or page wherever you want the user to\\n * supply an image. You control the slot's shape and size; the user fills it\\n * by dragging an image file onto it (or clicking to browse). The dropped\\n * image persists across reloads via a .image-slots.state.json sidecar —\\n * same read-via-fetch / write-via-window.omelette pattern as\\n * design_canvas.jsx, so the filled slot shows on share links, downloaded\\n * zips, and PPTX export. Outside the omelette runtime the slot is read-only.\\n *\\n * The host bridge only allows sidecar writes at the project root, so the\\n * HTML that uses this component is assumed to live at the project root too\\n * (same constraint as design_canvas.jsx).\\n *\\n * Attributes:\\n *   id           Persistence key. REQUIRED for the drop to survive reload —\\n *                every slot on the page needs a distinct id.\\n *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')\\n *                'circle' applies 50% border-radius; on a non-square slot\\n *                that's an ellipse — set equal width and height for a true\\n *                circle.\\n *   radius       Corner radius in px for 'rounded'.       (default 12)\\n *   mask         Any CSS clip-path value. Overrides `shape` — use this for\\n *                hexagons, blobs, arbitrary polygons.\\n *   fit          object-fit: cover | contain | fill.       (default 'cover')\\n *                With cover (the default) double-clicking the filled slot\\n *                enters a reframe mode: the whole image spills past the mask\\n *                (translucent outside, opaque inside), drag to reposition,\\n *                corner-drag to scale. The crop persists alongside the image\\n *                in the sidecar. contain/fill stay static.\\n *   position     object-position for fit=contain|fill.     (default '50% 50%')\\n *   placeholder  Empty-state caption.                      (default 'Drop an image')\\n *   src          Optional initial/fallback image URL. A user drop overrides\\n *                it; clearing the drop reveals src again.\\n *\\n * Size and layout come from ordinary CSS on the element — width/height\\n * inline or from a parent grid — so it composes with any layout.\\n *\\n * Usage:\\n *   <image-slot id=\\\"hero\\\"   style=\\\"width:800px;height:450px\\\" shape=\\\"rounded\\\" radius=\\\"20\\\"\\n *               placeholder=\\\"Drop a hero image\\\"><\\/image-slot>\\n *   <image-slot id=\\\"avatar\\\" style=\\\"width:120px;height:120px\\\" shape=\\\"circle\\\"><\\/image-slot>\\n *   <image-slot id=\\\"kite\\\"   style=\\\"width:300px;height:300px\\\"\\n *               mask=\\\"polygon(50% 0, 100% 50%, 50% 100%, 0 50%)\\\"><\\/image-slot>\\n */\\n/* END USAGE */\\n\\n(() => {\\n  const STATE_FILE = '.image-slots.state.json';\\n  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the\\n  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.\\n  const MAX_DIM = 1200;\\n  // Raster formats only. SVG is excluded (can carry script; createImageBitmap\\n  // on SVG blobs is inconsistent). GIF is excluded because the canvas\\n  // re-encode keeps only the first frame, so an animated GIF would silently\\n  // go still — better to reject than surprise.\\n  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];\\n\\n  // ── Shared sidecar store ────────────────────────────────────────────────\\n  // One fetch + immediate write-on-change for every <image-slot> on the\\n  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar\\n  // are served together; writes go through window.omelette.writeFile, which\\n  // the host allowlists to *.state.json basenames only.\\n  const subs = new Set();\\n  let slots = {};\\n  // ids explicitly cleared before the sidecar fetch resolved — otherwise\\n  // the merge below can't tell \\\"never set\\\" from \\\"just deleted\\\" and would\\n  // resurrect the sidecar's stale value.\\n  const tombstones = new Set();\\n  let loaded = false;\\n  let loadP = null;\\n\\n  function load() {\\n    if (loadP) return loadP;\\n    loadP = fetch(STATE_FILE)\\n      .then((r) => (r.ok ? r.json() : null))\\n      .then((j) => {\\n        // Merge: sidecar loses to any in-memory change that raced ahead of\\n        // the fetch (drop or clear) so neither is clobbered by hydration.\\n        if (j && typeof j === 'object') {\\n          const merged = Object.assign({}, j, slots);\\n          // A framing-only write that raced ahead of hydration must not\\n          // drop a user image that's only on disk — inherit u from the\\n          // sidecar for any in-memory entry that lacks one.\\n          for (const k in slots) {\\n            if (merged[k] && !merged[k].u && j[k]) {\\n              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;\\n            }\\n          }\\n          for (const id of tombstones) delete merged[id];\\n          slots = merged;\\n        }\\n        tombstones.clear();\\n      })\\n      .catch(() => {})\\n      .then(() => { loaded = true; subs.forEach((fn) => fn()); });\\n    return loadP;\\n  }\\n\\n  // Serialize writes so two near-simultaneous drops on different slots\\n  // can't reorder at the backend and leave the sidecar with only the\\n  // first. A save requested mid-flight just marks dirty and re-fires on\\n  // completion with the then-current slots.\\n  let saving = false;\\n  let saveDirty = false;\\n  function save() {\\n    if (saving) { saveDirty = true; return; }\\n    const w = window.omelette && window.omelette.writeFile;\\n    if (!w) return;\\n    saving = true;\\n    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))\\n      .catch(() => {})\\n      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });\\n  }\\n\\n  const S_MAX = 5;\\n  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));\\n\\n  // Normalize a stored slot value. Pre-reframe sidecars stored a bare\\n  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.\\n  function getSlot(id) {\\n    const v = slots[id];\\n    if (!v) return null;\\n    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;\\n  }\\n\\n  function setSlot(id, val) {\\n    if (!id) return;\\n    if (val) { slots[id] = val; tombstones.delete(id); }\\n    else { delete slots[id]; if (!loaded) tombstones.add(id); }\\n    subs.forEach((fn) => fn());\\n    // A drop is rare + high-value — write immediately so nav-away can't lose\\n    // it. Gate on the initial read so we don't overwrite a sidecar we haven't\\n    // merged yet; the merge in load() keeps this change once the read lands.\\n    if (loaded) save(); else load().then(save);\\n  }\\n\\n  // ── Image downscale ─────────────────────────────────────────────────────\\n  // Encode through a canvas so the sidecar carries resized bytes, not the\\n  // raw upload. Longest side is capped at 2× the slot's rendered width\\n  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG\\n  // for photos, so there's no need for per-image format picking.\\n  async function toDataUrl(file, targetW) {\\n    const bitmap = await createImageBitmap(file);\\n    try {\\n      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);\\n      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));\\n      const w = Math.max(1, Math.round(bitmap.width * scale));\\n      const h = Math.max(1, Math.round(bitmap.height * scale));\\n      const canvas = document.createElement('canvas');\\n      canvas.width = w; canvas.height = h;\\n      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);\\n      return canvas.toDataURL('image/webp', 0.85);\\n    } finally {\\n      bitmap.close && bitmap.close();\\n    }\\n  }\\n\\n  // ── Custom element ──────────────────────────────────────────────────────\\n  const stylesheet =\\n    ':host{display:inline-block;position:relative;vertical-align:top;' +\\n    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +\\n    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +\\n    // .frame img (clipped) and .spill (unclipped ghost + handles) share the\\n    // same left/top/width/height in frame-%, computed by _applyView(), so the\\n    // inside-mask crop and the outside-mask spill stay pixel-aligned.\\n    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +\\n    '  -webkit-user-drag:none;user-select:none;touch-action:none}'
