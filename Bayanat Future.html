document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

kground:#ff6a2b;color:#0a0a08;font-weight:700;font-size:16px;padding:15px 34px;border-radius:99px;\">Start a pilot<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== MARQUEE STRIP ===== -->\n  <div style=\"border-top:1px solid #1c211e;border-bottom:1px solid #1c211e;padding:20px 0;overflow:hidden;white-space:nowrap;\">\n    <div style=\"display:inline-flex;gap:0;animation:marquee 28s linear infinite;font-family:Archivo,sans-serif;font-weight:800;text-transform:uppercase;font-size:17px;letter-spacing:.04em;\">\n      <span style=\"padding:0 28px;color:#f4f4f1;\">Egyptian<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Gulf<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Levantine<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Najdi<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Maghrebi<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Hejazi<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">MSA<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan>\n      <span style=\"padding:0 28px;color:#f4f4f1;\">Egyptian<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Gulf<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Levantine<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Najdi<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Maghrebi<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">Hejazi<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan><span style=\"padding:0 28px;\">MSA<\u002Fspan><span style=\"padding:0 28px;color:#ff6a2b;\">✦<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== INTRO STATEMENT ===== -->\n  <div style=\"padding:110px 56px 80px;display:grid;grid-template-columns:0.4fr 1fr;gap:40px;\">\n    <div style=\"font-family:IBM Plex Mono,monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#ff6a2b;padding-top:14px;\">[ what we do ]<\u002Fdiv>\n    <h2 style=\"font-family:Archivo,sans-serif;font-weight:800;font-size:46px;line-height:1.12;letter-spacing:-.02em;margin:0;max-width:840px;\">We are the expert human-data engine for Arabic AI — the labeling, feedback and evaluation that turns frontier models into ones that actually understand the region.<\u002Fh2>\n  <\u002Fdiv>\n\n  <!-- ===== SERVICE 01 ===== -->\n  <div style=\"padding:64px 56px;border-top:1px solid #1c211e;display:grid;grid-template-columns:88px 1fr 360px;gap:40px;align-items:start;\">\n    <div style=\"font-family:IBM Plex Mono,monospace;font-size:15px;color:#ff6a2b;\">01<\u002Fdiv>\n    <h3 style=\"font-family:Archivo,sans-serif;font-weight:900;text-transform:uppercase;font-size:62px;line-height:.95;letter-spacing:-.02em;margin:0;\">Dialect data:<br>capture every<br>Arabic voice<\u002Fh3>\n    <p style=\"font-size:16px;line-height:1.65;color:#b6bbb6;margin-top:10px;\">Collection, transcription and annotation across 25+ spoken dialects — the informal, RTL, diacritic-sparse language that barely exists in digitized form. Engineered with gold-standard QA.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== SERVICE 02 ===== -->\n  <div style=\"padding:64px 56px;border-top:1px solid #1c211e;display:grid;grid-template-columns:88px 1fr 360px;gap:40px;align-items:start;\">\n    <div style=\"font-family:IBM Plex Mono,monospace;font-size:15px;color:#ff6a2b;\">02<\u002Fdiv>\n    <h3 style=\"font-family:Archivo,sans-serif;font-weight:900;text-transform:uppercase;font-size:62px;line-height:.95;letter-spacing:-.02em;margin:0;\">Human feedback:<br>teach models<br>real taste<\u002Fh3>\n    <p style=\"font-size:16px;line-height:1.65;color:#b6bbb6;margin-top:10px;\">Native speakers rank, correct and rewrite outputs so your model learns what a natural, culturally-appropriate Arabic answer sounds like. RLHF and preference data at expert grade.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== SERVICE 03 (highlight) ===== -->\n  <div style=\"padding:64px 56px;border-top:1px solid #1c211e;display:grid;grid-template-columns:88px 1fr 360px;gap:40px;align-items:start;background:radial-gradient(80% 140% at 12% 50%,rgba(255,106,43,.08),transparent 60%);\">\n    <div style=\"font-family:IBM Plex Mono,monospace;font-size:15px;color:#ff6a2b;\">03<\u002Fdiv>\n    <h3 style=\"font-family:Archivo,sans-serif;font-weight:900;text-transform:uppercase;font-size:62px;line-height:.95;letter-spacing:-.02em;margin:0;\">Evaluation:<br>the independent<br><span style=\"color:#ff6a2b;\">referee<\u002Fspan><\u002Fh3>\n    <p style=\"font-size:16px;line-height:1.65;color:#b6bbb6;margin-top:10px;\">Measure model quality across dialect comprehension, cultural fit, factuality and safety — plus red-teaming for the specific ways Arabic models fail. Know what's good before you ship.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== SERVICE 04 ===== -->\n  <div style=\"padding:64px 56px;border-top:1px solid #1c211e;border-bottom:1px solid #1c211e;display:grid;grid-template-columns:88px 1fr 360px;gap:40px;align-items:start;\">\n    <div style=\"font-family:IBM Plex Mono,monospace;font-size:15px;color:#ff6a2b;\">04<\u002Fdiv>\n    <h3 style=\"font-family:Archivo,sans-serif;font-weight:900;text-transform:uppercase;font-size:62px;line-height:.95;letter-spacing:-.02em;margin:0;\">Domain experts:<br>medical, legal<br>&amp; financial<\u002Fh3>\n    <p style=\"font-size:16px;line-height:1.65;color:#b6bbb6;margin-top:10px;\">Arabic data produced and judged by actual doctors, lawyers and bankers — the high-stakes work where generalists are weakest and accuracy is everything.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== SUB-CAPABILITY WHITE CARDS ===== -->\n  <div style=\"padding:80px 56px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px;\">\n    <div style=\"background:#f4f4f1;color:#0a0a08;border-radius:16px;padding:30px 26px;min-height:230px;display:flex;flex-direction:column;justify-content:space-between;\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#ff6a2b\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 3v18M3 12h18\"><\u002Fpath><\u002Fsvg>\n      <div><div style=\"font-family:Archivo,sans-serif;font-weight:800;text-transform:uppercase;font-size:19px;color:#ff6a2b;line-height:1.05;margin-bottom:10px;\">Data collection<\u002Fdiv><p style=\"font-size:13.5px;line-height:1.55;color:#55564f;margin:0;\">Sourcing real, consented Arabic speech and text at scale.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#f4f4f1;color:#0a0a08;border-radius:16px;padding:30px 26px;min-height:230px;display:flex;flex-direction:column;justify-content:space-between;\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#ff6a2b\" stroke-width=\"1.8\"><path d=\"M4 5h16M4 12h16M4 19h10\"><\u002Fpath><\u002Fsvg>\n      <div><div style=\"font-family:Archivo,sans-serif;font-weight:800;text-transform:uppercase;font-size:19px;color:#ff6a2b;line-height:1.05;margin-bottom:10px;\">Transcription<\u002Fdiv><p style=\"font-size:13.5px;line-height:1.55;color:#55564f;margin:0;\">Dialect-accurate audio-to-text with diacritic handling.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#f4f4f1;color:#0a0a08;border-radius:16px;padding:30px 26px;min-height:230px;display:flex;flex-direction:column;justify-content:space-between;\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#ff6a2b\" stroke-width=\"1.8\"><path d=\"M12 2 3 7v6c0 5 4 8 9 9 5-1 9-4 9-9V7l-9-5z\"><\u002Fpath><\u0 cross five dialects and four domains.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #1c211e;border-radius:16px;padding:32px 28px;background:#0c0f0d;\">\n          <div style=\"font-family:IBM Plex Mono,monospace;font-size:12px;color:#ff6a2b;letter-spacing:.1em;margin-bottom:24px;\">HEALTH AI<\u002Fdiv>\n          <div style=\"font-family:Archivo,sans-serif;font-weight:900;font-size:42px;letter-spacing:-.02em;margin-bottom:10px;\">2.1×<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.6;color:#9da29c;margin:0;\">fewer clinical errors in Arabic after expert physician review and correction.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== CTA ===== -->\n  <div style=\"padding:120px 56px 40px;text-align:center;\">\n    <div style=\"font-family:IBM Plex Mono,monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#ff6a2b;margin-bottom:26px;\">Tailored data · measurable results<\u002Fdiv>\n    <h2 style=\"font-family:Archivo,sans-serif;font-weight:900;text-transform:uppercase;font-size:72px;line-height:.95;letter-spacing:-.025em;margin:0 0 38px;\">Let's build the data<br>your model needs<\u002Fh2>\n    <span style=\"display:inline-block;background:#ff6a2b;color:#0a0a08;font-weight:700;font-size:17px;padding:17px 40px;border-radius:99px;\">Start a pilot<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ===== GIANT WORDMARK FOOTER ===== -->\n  <div style=\"padding:60px 0 0;overflow:hidden;border-top:1px solid #1c211e;margin-top:60px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;padding:0 56px 30px;\">\n      <div style=\"font-family:IBM Plex Mono,monospace;font-size:13px;color:#8d928c;line-height:1.9;\">\n        <div style=\"color:#ff6a2b;letter-spacing:.1em;margin-bottom:8px;\">CONTACT US<\u002Fdiv>\n        hello@bayanatlabs.com<br>Riyadh · KSA\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:26px;font-family:Archivo,sans-serif;font-
